name: clean-stack

services:
  postgres:
    image: postgres:17-alpine
    container_name: clean-stack-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clean_stack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: clean-stack-seaweedfs
    restart: unless-stopped
    command: server -s3 -dir=/data
    ports:
      - "8333:8333"
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8333/"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles: ["storage"]

  seaweedfs-init:
    image: chrislusf/seaweedfs:latest
    container_name: clean-stack-seaweedfs-init
    depends_on:
      seaweedfs:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - echo 's3.bucket.create -name clean-stack' | weed shell
        -master=seaweedfs:9333
    profiles: ["storage"]

  api:
    build:
      context: .
      dockerfile: apps/api/dev.Dockerfile
    container_name: clean-stack-api-dev
    ports:
      - "3000:3000"
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/clean_stack
      S3_ENDPOINT: http://seaweedfs:8333
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/livez"]
      interval: 30s
      timeout: 3s
      start_period: 20s
      retries: 5
    develop:
      watch:
        - action: sync
          path: ./apps/api/src
          target: /repo/apps/api/src
        - action: sync
          path: ./packages
          target: /repo/packages
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./pnpm-lock.yaml
        - action: rebuild
          path: ./turbo.json
        - action: rebuild
          path: ./pnpm-workspace.yaml
        - action: rebuild
          path: ./apps/api/package.json

  app:
    build:
      context: .
      dockerfile: apps/app/dev.Dockerfile
    container_name: clean-stack-app-dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      api:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/app/src
          target: /repo/apps/app/src
        - action: sync
          path: ./apps/app/index.html
          target: /repo/apps/app/index.html
        - action: sync
          path: ./packages
          target: /repo/packages
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./pnpm-lock.yaml
        - action: rebuild
          path: ./turbo.json
        - action: rebuild
          path: ./pnpm-workspace.yaml
        - action: rebuild
          path: ./apps/app/package.json

volumes:
  postgres_data:
  seaweedfs_data:
