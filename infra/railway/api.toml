"$schema" = "https://railway.com/railway.schema.json"

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/prod.Dockerfile"
watchPatterns = [
  "apps/api/**",
  "packages/**",
  "pnpm-lock.yaml",
  "turbo.json",
  "pnpm-workspace.yaml",
]


[deploy]
healthcheckPath = "/livez"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
