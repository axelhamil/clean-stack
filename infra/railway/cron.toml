"$schema" = "https://railway.com/railway.schema.json"

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/prod.Dockerfile"
watchPatterns = [
  "apps/api/src/cron/**",
  "apps/api/src/shared/internal-routes/**",
  "apps/api/prod.Dockerfile",
  "packages/**",
  "pnpm-lock.yaml",
]

[deploy]
cronSchedule = "17 3 * * *"
startCommand = "bun apps/api/src/cron/sweep.ts"
restartPolicyType = "NEVER"

